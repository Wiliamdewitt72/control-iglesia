<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Ofrendas</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ofrendas">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2ecc71">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; color: #666; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background: #27ae60; }
        .msg { margin-top: 15px; padding: 10px; border-radius: 6px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registrar Ofrenda</h2>
    <form id="ofrendaForm">
        <label for="monto">Monto ($)</label>
        <input type="number" id="monto" step="0.01" required placeholder="0.00">

        <label for="secretaria">Secretaría</label>
        <select id="secretaria" required>
            <option value="1">Niños</option>
            <option value="2">Educacional</option>
            <option value="3">General</option>
        </select>

        <button type="submit">Guardar Ofrenda</button>
    </form>
    <div id="respuesta" class="msg"></div>
</div>

<script>
    document.getElementById('ofrendaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const respuestaDiv = document.getElementById('respuesta');
        
        const datos = {
            monto: parseFloat(document.getElementById('monto').value),
            secretaria_id: parseInt(document.getElementById('secretaria').value)
        };

        try {
            const response = await fetch('/api/ofrendas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            const texto = await response.text();
            respuestaDiv.style.display = 'block';
            
            if (response.ok) {
                respuestaDiv.style.background = '#d4edda';
                respuestaDiv.style.color = '#155724';
                respuestaDiv.innerText = "¡Éxito! " + texto;
                document.getElementById('ofrendaForm').reset();
            } else {
                respuestaDiv.style.background = '#f8d7da';
                respuestaDiv.style.color = '#721c24';
                respuestaDiv.innerText = "Error: " + texto;
            }
        } catch (err) {
            alert("No se pudo conectar con el servidor Rust.");
        }
    });
</script>
</body>
</html>
